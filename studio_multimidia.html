<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Studio Multimídia</title>
<style>
:root{--bg:#050816;--bg2:#0b1025;--card:#121a35;--text:#e6ecff;--muted:#8a94b3;--accent:#7c5cfc}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:radial-gradient(1200px 800px at 20% -10%, #1a2455 0%, transparent 60%), radial-gradient(1000px 600px at 110% 10%, #0d3b5a 0%, transparent 50%), var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
header{position:sticky;top:0;z-index:50;background:rgba(5,8,22,.85);backdrop-filter:blur(14px);padding:14px 16px 10px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:12px}
header .menu{font-size:22px;opacity:.9}
header h1{font-size:1.25rem;font-weight:800;letter-spacing:.2px}
.view{flex:1;display:none;flex-direction:column}
.view.active{display:flex}
.home{padding:16px 14px 90px;max-width:520px;margin:0 auto;width:100%}
.section{margin:22px 0 14px}
.section h2{font-size:.95rem;color:var(--muted);font-weight:700;margin:0 6px 12px;letter-spacing:.3px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media(max-width:380px){.grid{grid-template-columns:repeat(2,1fr)}}
.card{position:relative;background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:18px 10px 14px;text-align:center;cursor:pointer;overflow:hidden;transition:.25s;box-shadow:0 8px 24px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.05)}
.card::before{content:'';position:absolute;inset:0;background:radial-gradient(200px 120px at 50% -20%, rgba(124,92,252,.25), transparent 60%);opacity:.7;transition:.3s}
.card:hover{transform:translateY(-3px);border-color:rgba(124,92,252,.5);box-shadow:0 12px 30px rgba(124,92,252,.2)}
.card .icon{font-size:28px;margin-bottom:10px;filter:drop-shadow(0 4px 10px rgba(0,0,0,.4))}
.card .label{font-size:.82rem;font-weight:700;line-height:1.2;color:#d6e0ff}
.card.c1{background:linear-gradient(165deg,#16244d,#0f1a36)}
.card.c1 .icon{color:#5eead4}
.card.c2{background:linear-gradient(165deg,#2a1a3d,#1a1030)}
.card.c2 .icon{color:#fbbf24}
.card.c3{background:linear-gradient(165deg,#3d1a4d,#2a1038)}
.card.c3 .icon{color:#e879f9}
.card.c4{background:linear-gradient(165deg,#0f2f3d,#0a2330)}
.card.c4 .icon{color:#34d399}
.card.c5{background:linear-gradient(165deg,#1a2e5a,#122242)}
.card.c5 .icon{color:#60a5fa}
.card.c6{background:linear-gradient(165deg,#3a1850,#2a1040)}
.card.c6 .icon{color:#c084fc}
.card.c7{background:linear-gradient(165deg,#134e4a,#0e3a37)}
.card.c7 .icon{color:#2dd4bf}
.card.c8{background:linear-gradient(165deg,#1e3a5f,#142944)}
.card.c8 .icon{color:#38bdf8}
.card.disabled{opacity:.45;cursor:not-allowed}

.toolview{position:relative;flex:1;background:#000}
.toolview iframe{position:absolute;inset:0;width:100%;height:100%;border:0;background:#000}
.tool-header{display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(10,14,30,.9);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,.08)}
.tool-header button{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:#fff;padding:8px 12px;border-radius:10px;font-weight:600;cursor:pointer}
.tool-header h3{font-size:1rem;font-weight:700}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(5,8,22,.92);backdrop-filter:blur(14px);border-top:1px solid rgba(255,255,255,.08);display:flex;justify-content:space-around;padding:10px 0 14px;z-index:60;max-width:520px;margin:0 auto}
.bottom-nav button{background:none;border:0;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:4px;font-size:.72rem;font-weight:600;cursor:pointer;padding:6px 18px;border-radius:12px;transition:.2s}
.bottom-nav button.active{color:#7dd3fc}
.bottom-nav .ico{font-size:22px}
</style>
</head>
<body>
<header>
  <div class="menu">☰</div>
  <h1>Studio Multimídia</h1>
</header>

<div id="home" class="view active">
  <div class="home">
    <div class="section">
      <h2>Edição de Áudio</h2>
      <div class="grid">
        <div class="card c1" data-tool="cortar"><div class="icon">✂️</div><div class="label">Cortar</div></div>
        <div class="card c2" data-tool="juntar"><div class="icon">🧩</div><div class="label">Juntar</div></div>
        <div class="card c3" data-tool="mixar"><div class="icon">🎚️</div><div class="label">Mixar</div></div>
        <div class="card c4" data-tool="dividir"><div class="icon">🪓</div><div class="label">Dividir</div></div>
        <div class="card c5" data-tool="inserir"><div class="icon">📥</div><div class="label">Inserir Áudio</div></div>
        <div class="card c6" data-tool="id3"><div class="icon">🏷️</div><div class="label">Tags ID3</div></div>
      </div>
    </div>

    <div class="section">
      <h2>Processamento</h2>
      <div class="grid">
        <div class="card c6" data-tool="video2audio"><div class="icon">🎬➡️🎵</div><div class="label">Vídeo para MP3</div></div>
        <div class="card c7" data-tool="audio2video"><div class="icon">🔊➡️🎬</div><div class="label">Áudio para Vídeo</div></div>
        <div class="card c8" data-tool="video2audio"><div class="icon">🔄</div><div class="label">Converter Formato</div></div>
        <div class="card c1" data-tool="compressor"><div class="icon">🗜️</div><div class="label">Compressor</div></div>
        <div class="card c2" data-tool="gravar"><div class="icon">🎙️</div><div class="label">Gravar</div></div>
        <div class="card c6" data-tool="id3"><div class="icon">🏷️</div><div class="label">Tags ID3</div></div>
      </div>
    </div>

    <div class="section">
      <h2>Criativo</h2>
      <div class="grid">
        <div class="card c4" data-tool="fotos"><div class="icon">🖼️</div><div class="label">Editor Fotos</div></div>
        <div class="card c5" data-tool="video"><div class="icon">🎞️</div><div class="label">Editor Vídeo</div></div>
        <div class="card c3" data-tool="equalizador"><div class="icon">🎛️</div><div class="label">Equalizador</div></div>
      </div>
    </div>
  </div>
</div>

<div id="tool" class="view toolview">
  <div class="tool-header">
    <button id="btnBack">← Voltar</button>
    <h3 id="toolTitle">Ferramenta</h3>
  </div>
  <iframe id="frame" allow="autoplay; clipboard-write; microphone *"></iframe>
</div>

<nav class="bottom-nav">
  <button class="active" id="navHome"><div class="ico">🏠</div><span>Início</span></button>
  <button id="navOutput"><div class="ico">📁</div><span>Arquivos</span></button>
</nav>

const frame = document.getElementById('frame');
const homeView = document.getElementById('home');
const toolView = document.getElementById('tool');
const toolTitle = document.getElementById('toolTitle');

function openTool(key, label){
  if(!tools[key]) return;
  toolTitle.textContent = label;
  if(tools[key].startsWith('data:text/html')){
    const b64 = tools[key].split(',')[1];
    const bin = atob(b64);
    const bytes = Uint8Array.from(bin, c => c.charCodeAt(0));
    const html = new TextDecoder('utf-8').decode(bytes);
    frame.srcdoc = html;
  } else {
    frame.src = tools[key];
  }
  homeView.classList.remove('active');
  toolView.classList.add('active');
  document.getElementById('navHome').classList.remove('active');
}

document.querySelectorAll('.card[data-tool]').forEach(c=>{
  if(c.classList.contains('disabled')) return;
  c.addEventListener('click',()=>{
    const key = c.dataset.tool;
    const label = c.querySelector('.label').textContent;
    openTool(key, label);
  });
});

document.getElementById('btnBack').onclick = ()=>{
  toolView.classList.remove('active');
  homeView.classList.add('active');
  frame.src = 'about:blank';
  document.getElementById('navHome').classList.add('active');
};
document.getElementById('navHome').onclick = ()=> document.getElementById('btnBack').click();

// ===== HISTÓRICO =====
const DB_NAME='studioHistory', STORE='files';
let db;
const openDB = () => new Promise((res,rej)=>{const r=indexedDB.open(DB_NAME,1);r.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains(STORE))d.createObjectStore(STORE,{keyPath:'id',autoIncrement:true});};r.onsuccess=()=>{db=r.result;res()};r.onerror=rej;});
const saveFile = (name,blob)=>new Promise(res=>{const tx=db.transaction(STORE,'readwrite');tx.objectStore(STORE).add({name,blob,type:blob.type,size:blob.size,ts:Date.now()});tx.oncomplete=res;});
const listFiles = ()=>new Promise(res=>{const tx=db.transaction(STORE,'readonly');const req=tx.objectStore(STORE).getAll();req.onsuccess=()=>res(req.result.reverse());});
window.addEventListener('message', async e=>{if(e.data?.type==='studio-history' && e.data.blob){await openDB();await saveFile(e.data.name, e.data.blob);}});
document.getElementById('navOutput').onclick = async ()=>{
  await openDB();
  const files = await listFiles();
  homeView.classList.remove('active');toolView.classList.add('active');toolTitle.textContent='Arquivos';
  let html=`<div style="padding:16px;background:#050816;color:#e6ecff;min-height:100vh"><h2 style="margin-bottom12px">Histórico de cortes</h2>`;
  if(files.length===0){html+='<p style="opacity:.7">Nenhum arquivo ainda. Exporte algo primeiro.</p>';}
  else{html+='<div style="display:grid;gap10px">';files.forEach(f=>{const url=URL.createObjectURL(f.blob);const date=new Date(f.ts).toLocaleString('pt-BR');html+=`<div style="background:#121a35;padding12px;border-radius12px;display:flex;justify-content:space-between;align-items:center"><div><div style="font-weight:700">${f.name}</div><div style="font-size:.75rem;opacity:.7">${date} • ${(f.size/1024).toFixed(1)} KB</div></div><div><a href="${url}" download="${f.name}" style="background:#7c5cfc;color:#fff;padding8px12px;border-radius8px;text-decoration:none;margin-right6px">Baixar</a><button onclick="this.nextElementSibling.style.display='block'" style="background:#1a2347;color:#fff;border0;padding8px12px;border-radius8px">Ouvir</button><audio controls src="${url}" style="display:none;width:100%;margin-top8px"></audio></div></div>`;});html+='</div>';}
  html+='</div>';frame.srcdoc=html;
};

</script>
